# JVM: KSP (Room + Hilt + Hilt-Work одновременно) — довольно тяжёлый annotation processing,
# на CI-раннерах с дефолтным -Xmx это иногда приводит к OutOfMemoryError в Gradle-демоне,
# который затем проявляется как хаотичные "cannot resolve" в KSP (а не как явный OOM) —
# поэтому явно даём демону больше памяти.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# KSP инкрементальная обработка — ускоряет повторные локальные сборки; на CI (чистый чекаут)
# не влияет на корректность, т.к. кеша всё равно нет.
ksp.incremental=true
