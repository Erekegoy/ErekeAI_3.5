name: Android CI (assembleDebug)

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - run: chmod +x gradlew

      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties

             - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks

      - name: Export signing variables
        run: |
          echo "KEYSTORE_FILE=$GITHUB_WORKSPACE/release.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      ####################################################
      # DIAGNOSTICS
      ####################################################

      - name: ToolRegistry
        continue-on-error: true
        run: |
          grep -R -n "class ToolRegistry\|interface Tool\b\|typealias ToolRegistry" app/src/main/java || true

      - name: Tool.kt
        continue-on-error: true
        run: |
          sed -n '1,260p' app/src/main/java/com/erekeai/domain/tool/Tool.kt || true

      - name: ToolModels.kt
        continue-on-error: true
        run: |
          sed -n '1,260p' app/src/main/java/com/erekeai/domain/tool/ToolModels.kt || true

      - name: Room
        continue-on-error: true
        run: |
          grep -R -n "@Database\|@Dao\|@Entity" app/src/main/java || true

      - name: Generated Sources
        continue-on-error: true
        run: |
          find app/build/generated -type f | head -100 || true

      - name: Compile Kotlin
        continue-on-error: true
        run: |
          ./gradlew :app:compileDebugKotlin --stacktrace --info --no-daemon 2>&1 | tee compile.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compile-log
          path: compile.log

      ####################################################
      # BUILD
      ####################################################

      - name: Build APK
        run: |
          ./gradlew :app:assembleRelease --stacktrace --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ErekeAI-debug
          path: app/build/outputs/apk/release/*.apk
