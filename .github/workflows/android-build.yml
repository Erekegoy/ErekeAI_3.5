name: Android CI (assembleDebug)

# ВАЖНО: этот workflow всегда вызывает ./gradlew (обёртку, версия зафиксирована в
# gradle/wrapper/gradle-wrapper.properties = 8.7, совместима с AGP 8.5.2), а НЕ системный
# `gradle` из PATH раннера — на GitHub-раннерах системный Gradle может оказаться значительно
# новее (например 9.x), а AGP 8.5.2 рассчитан на Gradle 8.7-8.9. Несовпадение версий даёт
# лавину непонятных "error.NonExistentClass" в KSP, которая маскирует реальную причину.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Кэш Gradle/KSP ускоряет повторные сборки и не влияет на корректность первой сборки.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Плейсхолдер local.properties: без него AGP не найдёт Android SDK. На официальных
      # ubuntu-latest раннерах Android SDK уже установлен и переменная ANDROID_HOME задана —
      # достаточно указать её как sdk.dir. API-ключи (GEMINI/GROQ/OPENAI) намеренно оставлены
      # пустыми — это не требуется для успешной компиляции, ключи вводятся в самом приложении.
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ErekeAI-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
